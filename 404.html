<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <script>
    (function () {
      const stored = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", stored || (prefersDark ? "dark" : "light"));
    })();
  </script>

  <title>Page Not Found | Kiran Kadam</title>
  <meta name="description" content="The page you are looking for could not be found on kirankadam.in.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://kirankadam.in/404.html">

  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header id="site-header" class="site-header"></header>

  <main id="main-content">
    <section class="section" style="min-height: 60vh; display: grid; place-items: center; text-align: center;" aria-labelledby="error-title">
      <div class="container reveal">
        <div style="font-size: 6rem; font-weight: 800; color: var(--primary); line-height: 1;">404</div>
        <h1 id="error-title" class="section-title" style="font-size: 2rem; margin: 1rem 0;">Page Not Found</h1>
        <p style="max-width: 480px; margin: 0 auto 1.5rem;">Sorry, the page you requested does not exist or has been moved. Check the URL or return to the homepage.</p>
        <div class="hero-actions" style="justify-content: center;">
          <a href="index.html" class="btn btn-primary">Go Home</a>
          <a href="blog.html" class="btn btn-secondary">Read Blog</a>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <button type="button" id="back-to-top" class="back-to-top" aria-label="Back to top" title="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="js/script.js" defer></script>
</body>
</html>
